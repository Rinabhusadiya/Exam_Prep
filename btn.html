<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCE Registration Dashboard</title>
    <style>
        :root {
            --cce-purple: #4834d4;
            --cce-gold: #f0932b;
            --bg-light: #f4f7f6;
            --white: #ffffff;
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            background: var(--bg-light); 
            margin: 0; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .main-card {
            background: var(--white);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 800px;
        }

        h2 { text-align: center; color: var(--cce-purple); margin-bottom: 30px; }

        /* --- FORM STYLING --- */
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 10px;
            box-sizing: border-box;
        }

        /* --- BUTTONS (CENTERED) --- */
        .btn-container {
            text-align: center; /* બટનને સેન્ટરમાં લાવવા માટે */
            margin-top: 20px;
        }

        .btn-submit {
            padding: 15px 50px; /* બટનને થોડું પહોળું કર્યું */
            background: var(--cce-purple);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s ease;
            font-size: 16px;
            display: inline-block;
        }

        .btn-submit:hover {
            background: var(--cce-gold);
            transform: scale(1.05); /* માઉસ ઉપર જાય ત્યારે સહેજ મોટું થશે */
        }

        /* --- TABLE STYLING --- */
        #table-section { display: none; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: var(--cce-purple); color: white; }

        .btn-back {
            margin-top: 30px;
            padding: 12px 40px;
            background: #333;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            display: inline-block;
        }
    </style>
</head>
<body>

<div class="main-card">
    
    <div id="form-section">
        <h2>Registration Form</h2>
        <form id="regForm">
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="Enter full name" required>
            </div>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="Enter email" required>
            </div>
            <div class="input-group">
                <label>Mobile Number</label>
                <input type="tel" id="mobile" placeholder="Enter mobile number" required>
            </div>
            
            <div class="btn-container">
                <button type="submit" class="btn-submit">Register Now</button>
            </div>
        </form>
    </div>

    <div id="table-section">
        <h2>Registered Candidates</h2>
        <div style="overflow-x: auto;">
            <table id="userTable">
                <thead>
                    <tr>
                        <th>Sr.</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Mobile</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
        <div class="btn-container">
            <button class="btn-back" onclick="showForm()">← Back to Form</button>
        </div>
    </div>

</div>

<script>
    const formSection = document.getElementById('form-section');
    const tableSection = document.getElementById('table-section');
    const regForm = document.getElementById('regForm');
    const tableBody = document.querySelector('#userTable tbody');

    regForm.addEventListener('submit', function(e) {
        e.preventDefault();
        const newUser = {
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            mobile: document.getElementById('mobile').value
        };

        let users = JSON.parse(localStorage.getItem('cce_records')) || [];
        users.push(newUser);
        localStorage.setItem('cce_records', JSON.stringify(users));

        regForm.reset();
        showTable();
    });

    function showTable() {
        formSection.style.display = 'none';
        tableSection.style.display = 'block';
        const users = JSON.parse(localStorage.getItem('cce_records')) || [];
        tableBody.innerHTML = users.map((user, i) => `
            <tr>
                <td>${i + 1}</td>
                <td>${user.name}</td>
                <td>${user.email}</td>
                <td>${user.mobile}</td>
            </tr>
        `).join('');
    }

    function showForm() {
        tableSection.style.display = 'none';
        formSection.style.display = 'block';
    }
</script>

</body>
</html>
