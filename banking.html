<!DOCTYPE html>
<html>
<head>
<title>Banking Exams</title>

<style>

body{
font-family:Arial;
padding:40px;
background:#f5f7fa;
}

/* Page Title Animation */

h1{
text-align:center;
margin-bottom:40px;
animation:fadeDown 1s ease;
}

/* Grid Layout */

.exam-container{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

/* Card Style */

.exam-card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
cursor:pointer;
transition:0.3s;
text-align:center;
font-size:18px;
font-weight:bold;
}

/* Mouse Hover Effect */

.exam-card:hover{
transform:translateY(-10px) scale(1.03);
box-shadow:0 10px 25px rgba(0,0,0,0.2);
background:#e8f7ff;
}

/* Mouse Click Animation */

.exam-card:active{
transform:scale(0.95);
}

/* Animation */

@keyframes fadeDown{

from{
opacity:0;
transform:translateY(-40px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* Card Entry Animation */

.exam-card{
animation:fadeUp 0.8s ease;
}

@keyframes fadeUp{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}

}

</style>

</head>

<body>

<h1>Banking Exams Preparation</h1>

<div class="exam-container">

<div class="exam-card">IBPS PO</div>

<div class="exam-card">IBPS Clerk</div>

<div class="exam-card">SBI PO</div>

<div class="exam-card">SBI Clerk</div>

<div class="exam-card">RBI Assistant</div>

<div class="exam-card">NABARD Development Officer</div>

</div>

</body>
</html>
